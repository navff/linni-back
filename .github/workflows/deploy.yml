name: Deploy backend to Yandex Serverless Containers

on:
  push:
    branches:
      - master

env:
  CR_REGISTRY: cr.yandex/${{ vars.YC_REGISTRY_ID }}
  IMAGE_NAME: linni-back

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build Docker image
        run: |
          docker build -t $CR_REGISTRY/$IMAGE_NAME:${{ github.sha }} .
          docker tag $CR_REGISTRY/$IMAGE_NAME:${{ github.sha }} $CR_REGISTRY/$IMAGE_NAME:latest

      - name: Push Docker image
        run: |
          docker push $CR_REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker push $CR_REGISTRY/$IMAGE_NAME:latest

      - name: Deploy to Yandex Serverless Containers
        uses: yc-actions/yc-sls-container-deploy@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          container-name: ${{ vars.YC_CONTAINER_NAME }}
          folder-id: ${{ vars.YC_FOLDER_ID }}
          revision-image-url: ${{ env.CR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          revision-service-account-id: ${{ vars.YC_SERVICE_ACCOUNT_ID }}
          revision-env: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            S3_ENDPOINT=${{ vars.S3_ENDPOINT }}
            S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
            S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
            S3_BUCKET=${{ vars.S3_BUCKET }}
            CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
